name: SibbyRespect Automation Schedule

on:
  schedule:
    # 4x per day at US Eastern Times (standardized to UTC)
    # 13:00 UTC = 09:00 AM EST (Run Cleanup)
    - cron: '0 13 * * *'
    # 17:00 UTC = 12:00 PM EST
    - cron: '0 17 * * *'
    # 22:00 UTC = 05:00 PM EST
    - cron: '0 22 * * *'
    # 02:00 UTC = 09:00 PM EST (next day)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional Topic Override'
        required: false

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          # Determine if cleanup should run (only on the 9AM EST / 13:00 UTC run)
          RUN_CLEANUP: ${{ github.event.schedule == '0 13 * * *' && 'true' || 'false' }}
        run: |
          # If triggered manually with an input topic
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.topic }}" ]; then
            python main.py --topic "${{ github.event.inputs.topic }}"
          else
            python scheduler.py
          fi
