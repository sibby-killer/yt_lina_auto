name: Ashley MindShift Automation Schedule

on:
  schedule:
    # 5 Times a Day (USA EST Optimized)
    # 09:00 AM EST -> 14:00 UTC
    # 12:00 PM EST -> 17:00 UTC
    # 03:00 PM EST -> 20:00 UTC
    # 06:00 PM EST -> 23:00 UTC
    # 09:00 PM EST -> 02:00 UTC (Next Day)
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install imageio-ffmpeg

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create Directories
        run: |
          mkdir -p temp output

      - name: Run Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        run: python main.py
