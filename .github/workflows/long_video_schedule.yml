name: Ashley MindShift Long-Form Automation

on:
  schedule:
    # 2 Times a Day (USA EST Optimized)
    # 10:00 AM EST -> 15:00 UTC
    # 05:00 PM EST -> 22:00 UTC
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  generate-long:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to push video_database.json back to repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install imageio-ffmpeg

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create Directories
        run: |
          mkdir -p temp output

      - name: Run Long-Form Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          TIKTOK_COOKIES_PATH: "tiktok_cookies.txt"
        run: |
          echo "${{ secrets.TIKTOK_COOKIES_JSON }}" > tiktok_cookies.txt
          python long_main.py

      - name: Commit video database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add video_database.json used_topics.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update video database and used topics"
          git push
